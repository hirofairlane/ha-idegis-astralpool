name: pool-brain tests

on:
  push:
    branches: [main]
    paths:
      - "addon-pool-brain/**"
      - ".github/workflows/pool-brain-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "addon-pool-brain/**"
      - ".github/workflows/pool-brain-tests.yml"

permissions:
  contents: read

jobs:
  pytest:
    name: pytest on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: addon-pool-brain/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: addon-pool-brain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: addon-pool-brain
        run: pytest -v
