esphome:
  name: bus-idegis
  friendly_name: bus-idegis

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

# ---- Logging -------------------------------------------------------------
# DEBUG global durante bring-up. Bajar a INFO cuando todo funcione.
logger:
  level: DEBUG
  baud_rate: 0

# ---- Integración con HA --------------------------------------------------
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: "b8397dd79329205ab2dcc4752041a15e"

# ---- Wi-Fi + fallback ---------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Bus-Idegis Fallback Hotspot"
    password: "k8xD4hV8dF7X"

captive_portal:

# ---- Panel web local ----------------------------------------------------
# http://bus-idegis.local  (mDNS) — la IP depende del DHCP del router
web_server:
  port: 80
  version: 3
  local: true

# ---- BLE scanner (pasivo, low impact en WiFi) ---------------------------
# Cada lectura BLE pisa la antena WiFi un instante; con scan_interval 1100ms
# y duty cycle del 30% el impacto en latencia WiFi es despreciable.
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 300ms
    active: false   # pasivo: solo lee advertisements; ahorra mucho RF

bluetooth_proxy:
  active: false

# ---- Modbus RTU ---------------------------------------------------------
uart:
  id: mod_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: EVEN
  stop_bits: 1

modbus:
  id: modbus_rtu
  uart_id: mod_bus
  # send_wait_time: ventana de espera tras enviar antes de leer la
  # respuesta. Doc oficial recomienda 100-200 ms. 200 ms da margen
  # cómodo para slaves lentos sin perder ventanas.
  send_wait_time: 200ms
  # Para módulos NO auto-direction descomentar y poner el GPIO que
  # controla DE/RE. El módulo de este proyecto es auto-direction
  # (ver docs/03-wiring-esp32.md), no hace falta.
  # flow_control_pin: GPIO5

modbus_controller:
  - id: idegis
    address: 5
    modbus_id: modbus_rtu
    setup_priority: -10
    update_interval: 30s
    # command_throttle: gap mínimo entre comandos consecutivos en
    # el bus. 50 ms es suficiente para que el slave digiera y el
    # MAX485 conmute de TX a RX.
    command_throttle: 50ms
    # offline_skip_updates: ciclos a saltar tras detectar offline.
    # 0 = no saltar, reintentar en cada ciclo. Útil mientras
    # validamos hardware; subir a 5-10 cuando ya responda bien.
    offline_skip_updates: 0

# ---- Sensores -----------------------------------------------------------
sensor:
  - platform: wifi_signal
    name: "WiFi signal"
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
  - platform: internal_temperature
    name: "ESP internal temperature"
  # Modbus baseline: pH (input 0x51) + capabilities (holding 0x06).
  # Si responde uno → el bus está vivo, expandimos al resto de la
  # tabla 1.62. Si no → hay que tocar el cableado físico.
  - platform: modbus_controller
    modbus_controller_id: idegis
    name: "pH Modbus"
    id: ph_modbus
    register_type: read
    address: 0x51
    register_count: 1
    value_type: U_WORD
    unit_of_measurement: "pH"
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
  - platform: modbus_controller
    modbus_controller_id: idegis
    name: "Capabilities raw"
    register_type: holding
    address: 0x06
    register_count: 1
    value_type: U_WORD

# ---- Texto: SSID e IP ---------------------------------------------------
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP address"
    ssid:
      name: "Wi-Fi SSID"

# ---- 4 botones touch TTP223 (preparados, sin acciones todavía) ----------
# Pinout reservado:
#   B1 -> GPIO32
#   B2 -> GPIO33
#   B3 -> GPIO25
#   B4 -> GPIO26
# Los TTP223 entregan pulso HIGH cuando se tocan; no necesitan pull externo.
# Modo configurado: INPUT (sin pull). Los binary_sensors aparecen como
# "Touch 1..4" en HA y puedes ya hacer automatizaciones HA con ellos.
# Si más adelante quieres acciones en el propio ESP (latencia <50ms,
# funcionan aunque HA esté caído), añadimos on_press / on_double_click /
# on_multi_click aquí mismo.
binary_sensor:
  - platform: gpio
    name: "Touch 1"
    id: touch_1
    pin:
      number: GPIO32
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
  - platform: gpio
    name: "Touch 2"
    id: touch_2
    pin:
      number: GPIO33
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
  - platform: gpio
    name: "Touch 3"
    id: touch_3
    pin:
      number: GPIO25
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
  - platform: gpio
    name: "Touch 4"
    id: touch_4
    pin:
      number: GPIO26
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms

# ---- Botones diagnósticos -----------------------------------------------
button:
  - platform: restart
    name: "Restart ESP"
