---
name: "Idegis Pool Brain"
description: >-
  Closed-loop pool brain on top of the Idegis cloud capturer. Turns the raw
  telemetry into a TFP-aware health score, smart filtration scheduler,
  pump anomaly watchdog with emergency stop, weekly HTML email report and
  a comic-styled ingress dashboard.
version: "0.4.0"
slug: "idegis_pool_brain"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
url: "https://github.com/hirofairlane/ha-idegis-astralpool"
startup: services
boot: auto
homeassistant_api: true
hassio_api: false
host_network: false
homeassistant_config: rw
ingress: true
ingress_port: 8099
panel_icon: mdi:brain
panel_title: "Pool Brain"
panel_admin: false
services:
  - mqtt:need
options:
  capturer_base_url: "http://localhost:8765"
  pool_volume_m3: 37
  pump_switch_entity: "switch.depuradora"
  pump_power_entity: "sensor.shellypro4pm_30c6f7836a6c_power_3"
  cleaner_switch_entity: "switch.limpiafondos"
  cleaner_power_entity: "sensor.shellypro4pm_30c6f7836a6c_power_1"
  notify_telegram_service: "notify.telegram_bot_1353549989_1458801761"
  notify_email_service: ""
  weekly_report_enabled: true
  weekly_report_day: "sun"
  weekly_report_hour: 20
  auto_emergency_stop: false
  target_turnovers_per_day: 1.0
  first_minutes_window_s: 300
  auto_bootstrap_package: true
  log_level: "info"
schema:
  capturer_base_url: str
  pool_volume_m3: float(1,500)
  pump_switch_entity: str
  pump_power_entity: str
  cleaner_switch_entity: str?
  cleaner_power_entity: str?
  notify_telegram_service: str?
  notify_email_service: str?
  weekly_report_enabled: bool
  weekly_report_day: list(mon|tue|wed|thu|fri|sat|sun)
  weekly_report_hour: int(0,23)
  auto_emergency_stop: bool
  target_turnovers_per_day: float(0.1,5.0)
  first_minutes_window_s: int(0,1800)
  auto_bootstrap_package: bool
  log_level: list(trace|debug|info|notice|warning|error|fatal)
