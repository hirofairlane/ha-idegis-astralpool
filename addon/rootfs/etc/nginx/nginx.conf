# nginx for the Idegis capturer add-on.
# Single vhost on :80 that forwards api.idegis.net traffic to the real
# Imperva-fronted backend while logging every request in a parseable
# format for the Python capturer process.

user root;
worker_processes auto;
pid /run/nginx/nginx.pid;
daemon off;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 30s;
    server_tokens off;

    # Single line log per chlorinator request. Parsed by capturer.py.
    log_format idegis_full '$time_iso8601 client=$remote_addr "$request" '
                           'status=$status sent=$body_bytes_sent '
                           'upstream_status=$upstream_status upstream_time=$upstream_response_time '
                           'req_len=$request_length';

    access_log /data/captures/idegis_proxy_access.log idegis_full;
    error_log  /data/captures/idegis_proxy_error.log warn;

    # The cloud backend is reached by literal IP to avoid a DNS lookup
    # loop (we ARE the DNS target for api.idegis.net).
    upstream idegis_cloud {
        server _UPSTREAM_HOST_:80;
        keepalive 8;
    }

    server {
        listen 80 default_server;
        server_name api.idegis.net _;

        location / {
            proxy_pass http://idegis_cloud$request_uri;
            proxy_set_header Host _UPSTREAM_HOST_HEADER_;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.0;
            proxy_buffering off;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }
    }
}
