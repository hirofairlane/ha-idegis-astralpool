---
name: "Idegis / AstralPool cloud capturer"
description: >-
  Local capture and decode of the Idegis / AstralPool pool chlorinator
  cloud telemetry (Fluidra Multi-Tec platform). Acts as a transparent
  HTTP reverse proxy for api.idegis.net and exposes the decoded state
  on a local JSON API the companion Home Assistant integration consumes.
version: "0.6.5"
slug: "idegis_capturer"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
url: "https://github.com/hirofairlane/ha-idegis-astralpool"
startup: services
boot: auto
ports:
  80/tcp: 80
  8765/tcp: 8765
ports_description:
  80/tcp: "HTTP listener for the chlorinator (DNS-overridden api.idegis.net)"
  8765/tcp: "Capturer JSON API for the HA integration"
options:
  upstream_host: "45.60.153.189"
  upstream_host_header: "api.idegis.net"
  log_level: "info"
  max_history: 1000
  online_timeout_s: 90
  pump_power_entity: "sensor.shellypro4pm_30c6f7836a6c_power_3"
  cleaner_power_entity: "sensor.shellypro4pm_30c6f7836a6c_power_1"
  pump_switch_entity: "switch.depuradora"
  cleaner_switch_entity: "switch.limpiafondos"
  pool_volume_m3: 37.0
  pump_nominal_flow_m3_h: 12.0
  energy_price_eur_kwh: 0.18
  cell_capacity_g_h: 24.0
  target_production_pct: 40
  chlorine_demand_ppm_per_day: 0.6
  min_turnovers_per_day: 0.75
  apply_temp_multiplier: false
  indoor_pool: true
  net_n_clean_installed: false
  pump_running_threshold_w: 1.0
  pump_poll_interval_s: 5
schema:
  upstream_host: str
  upstream_host_header: str
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  max_history: int(50,10000)
  online_timeout_s: int(10,3600)
  pump_power_entity: str?
  cleaner_power_entity: str?
  pump_switch_entity: str?
  cleaner_switch_entity: str?
  pool_volume_m3: float(1,500)
  pump_nominal_flow_m3_h: float(1,100)
  energy_price_eur_kwh: float(0,2)
  cell_capacity_g_h: float(1,200)
  target_production_pct: int(1,100)
  chlorine_demand_ppm_per_day: float(0.1,10)
  min_turnovers_per_day: float(0.1,5)
  apply_temp_multiplier: bool
  indoor_pool: bool
  net_n_clean_installed: bool
  pump_running_threshold_w: float(0,10000)
  pump_poll_interval_s: int(1,60)
host_network: false
panel_icon: mdi:pool
panel_title: "Idegis capturer"
homeassistant_api: true
hassio_api: false
ingress: true
ingress_port: 8765
